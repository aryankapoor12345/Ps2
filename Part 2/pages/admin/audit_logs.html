<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Audit Logs - NTPC Online Safety Portal</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/forms.css">
    <link rel="stylesheet" href="/assets/css/tables.css">
</head>
<body>
<table class="page-shell" cellpadding="0" cellspacing="0">
    <tr id="header-container"></tr>
    <tr>
        <td class="sidebar-cell" id="sidebar-container" style="display:none;"></td>
        <td class="content-cell">
            <h2>System Audit Logs</h2>
            <p class="info-txt">Audit trail tracking all CRUD activities, page access attempts, and configuration alterations.</p>
            
            <table class="data-table" cellpadding="3" cellspacing="0" style="width:100%; border-collapse:collapse; margin-top:20px;">
                <thead>
                    <tr>
                        <th width="20%">Log Date / Time</th>
                        <th width="20%">User ID</th>
                        <th>Action Log Message</th>
                        <th width="15%">Entity</th>
                        <th width="15%">Record ID</th>
                    </tr>
                </thead>
                <tbody id="logs-list-body">
                    <tr><td colspan="5" align="center">Retrieving system audit logs...</td></tr>
                </tbody>
            </table>
        </td>
    </tr>
    <tr id="footer-container"></tr>
</table>

<script type="module">
    import { initAuthCheck } from '/firebase/auth.js';
    import { enforcePageAccess } from '/firebase/roles.js';
    import { renderHeader, renderSidebar, renderFooter } from '/components/layout.js';
    import { db } from '/firebase/firebase.js';
    import { collection, query, orderBy, limit, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { formatDateTime } from '/firebase/utils.js';

    initAuthCheck().then(async (user) => {
        if (!user) return;
        enforcePageAccess(user);
        
        await renderHeader(user);
        renderSidebar(user);
        renderFooter();

        await loadAuditLogs();
    }).catch(err => {
        console.error("Audit logs init error:", err);
    });

    async function loadAuditLogs() {
        const body = document.getElementById('logs-list-body');
        try {
            const q = query(collection(db, 'audit_logs'), orderBy('created_at', 'desc'), limit(150));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) {
                body.innerHTML = `<tr><td colspan="5" align="center" style="font-style:italic; color:#666;">No system audit logs found.</td></tr>`;
                return;
            }

            let html = '';
            snapshot.docs.forEach(docSnap => {
                const log = docSnap.data();
                html += `
                    <tr>
                        <td>${formatDateTime(log.created_at)}</td>
                        <td><code>${log.user_id || 'System'}</code></td>
                        <td>${log.action}</td>
                        <td>${log.table_name || 'N/A'}</td>
                        <td><small>${log.record_id || 'N/A'}</small></td>
                    </tr>
                `;
            });
            body.innerHTML = html;
        } catch (e) {
            console.error("Error fetching audit logs:", e);
            body.innerHTML = `<tr><td colspan="5" align="center" style="color:red;">Error loading audit logs: ${e.message}</td></tr>`;
        }
    }
</script>
</body>
</html>
