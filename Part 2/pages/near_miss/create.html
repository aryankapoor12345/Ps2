<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Near Miss - NTPC Online Safety Portal</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/forms.css">
    <link rel="stylesheet" href="/assets/css/tables.css">
</head>
<body>
<table class="page-shell" cellpadding="0" cellspacing="0">
    <tr id="header-container"></tr>
    <tr>
        <td class="sidebar-cell" id="sidebar-container" style="display:none;"></td>
        <td class="content-cell">
            <h2>Report Near Miss Incident</h2>
            
            <div id="error-container" class="flash flash-error" style="display:none;"></div>
            
            <form id="create-nm-form" enctype="multipart/form-data" class="validate-form">
                <table class="form-table" cellpadding="4" cellspacing="0" style="width:100%;">
                    <tr>
                        <td class="label-cell" width="25%">Reported By</td>
                        <td id="nm-reporter">--</td>
                    </tr>
                    <tr>
                        <td class="label-cell">Safety Zone <span class="required">*</span></td>
                        <td>
                            <select name="zone_id" id="nm-zone" required>
                                <option value="">--Select Safety Zone--</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell">Department <span class="required">*</span></td>
                        <td>
                            <select name="department_id" id="nm-dept" required>
                                <option value="">--Select Department--</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell">Incident Location <span class="required">*</span></td>
                        <td><input type="text" name="incident_location" class="long-input" placeholder="e.g. CHP conveyor transfer point" required></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Incident Date <span class="required">*</span></td>
                        <td><input type="date" name="incident_date" id="nm-date" class="date-input" required></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Incident Time</td>
                        <td><input type="time" name="incident_time" id="nm-time" class="text-input" style="width:150px;"></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Incident Description <span class="required">*</span></td>
                        <td><textarea name="incident_description" rows="5" required minlength="10" placeholder="Describe the near miss incident in detail..."></textarea></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Possible Consequence</td>
                        <td><textarea name="possible_consequence" rows="3" placeholder="What could have happened (consequence)..."></textarea></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Immediate Preventive Action</td>
                        <td><textarea name="preventive_action" rows="3" placeholder="Describe preventive action implemented or recommended..."></textarea></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Upload Document/Photo (Max 2MB)</td>
                        <td><input type="file" name="attachment" id="nm-file"></td>
                    </tr>
                    <tr>
                        <td>&nbsp;</td>
                        <td>
                            <input type="submit" value="Save Report" class="save-button" id="submit-btn">
                            <a href="/dashboard.html" class="plain-link-button" style="background:#6c757d; margin-left:10px;">Cancel</a>
                        </td>
                    </tr>
                </table>
            </form>
        </td>
    </tr>
    <tr id="footer-container"></tr>
</table>

<script type="module">
    import { initAuthCheck } from '/firebase/auth.js';
    import { enforcePageAccess } from '/firebase/roles.js';
    import { renderHeader, renderSidebar, renderFooter } from '/components/layout.js';
    import { getAllZones, getAllDepartments, logAudit } from '/firebase/firestore.js';
    import { generateNearMissNo } from '/firebase/utils.js';
    import { uploadFile } from '/firebase/storage.js';
    import { db } from '/firebase/firebase.js';
    import { collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    let currentUser = null;
    let zoneList = [];
    let deptList = [];

    initAuthCheck().then(async (user) => {
        if (!user) return;
        enforcePageAccess(user);
        currentUser = user;
        
        await renderHeader(user);
        renderSidebar(user);
        renderFooter();
        
        document.getElementById('nm-reporter').innerText = `${user.employee_id} - ${user.full_name}`;
        
        const now = new Date();
        document.getElementById('nm-date').value = now.toISOString().split('T')[0];
        document.getElementById('nm-time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        
        zoneList = await getAllZones();
        deptList = await getAllDepartments();
        
        const zoneSelect = document.getElementById('nm-zone');
        zoneList.forEach(z => {
            zoneSelect.innerHTML += `<option value="${z.id}">${z.zone_name}</option>`;
        });
        
        const deptSelect = document.getElementById('nm-dept');
        deptList.forEach(d => {
            deptSelect.innerHTML += `<option value="${d.id}">${d.department_name}</option>`;
        });
    }).catch(err => {
        console.error("Create near miss init failed:", err);
    });

    // Form Submit
    const form = document.getElementById('create-nm-form');
    const errContainer = document.getElementById('error-container');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errContainer.style.display = 'none';
        
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.value = "Saving Report...";
        
        const fileInput = document.getElementById('nm-file');
        const file = fileInput.files[0];
        
        let attachmentPath = null;
        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                showError("File size exceeds 2MB limit.");
                resetSubmitBtn();
                return;
            }
            const uploadRes = await uploadFile(file, 'nearmiss');
            if (uploadRes.success) {
                attachmentPath = uploadRes.path;
            } else {
                showError("File upload failed: " + uploadRes.message);
                resetSubmitBtn();
                return;
            }
        }
        
        try {
            const zoneObj = zoneList.find(z => z.id === form.zone_id.value);
            const deptObj = deptList.find(d => d.id === form.department_id.value);
            const nmNo = await generateNearMissNo();
            
            const docData = {
                near_miss_no: nmNo,
                reported_by: currentUser.uid || currentUser.id,
                reported_by_name: currentUser.full_name,
                reported_by_employee_id: currentUser.employee_id,
                zone_id: form.zone_id.value,
                zone_name: zoneObj.zone_name,
                department_id: form.department_id.value,
                department_name: deptObj.department_name,
                incident_location: form.incident_location.value.trim(),
                incident_description: form.incident_description.value.trim(),
                possible_consequence: form.possible_consequence.value.trim() || null,
                preventive_action: form.preventive_action.value.trim() || null,
                incident_date: form.incident_date.value,
                incident_time: form.incident_time.value || null,
                attachment_path: attachmentPath,
                status_name: 'Reported',
                created_at: serverTimestamp()
            };
            
            const docRef = await addDoc(collection(db, 'near_miss_reports'), docData);
            
            await logAudit(currentUser.uid || currentUser.id, `Reported near miss ${nmNo}`, 'near_miss_reports', docRef.id);
            alert(`Near miss report recorded successfully! ID: ${nmNo}`);
            window.location.href = `/pages/near_miss/view.html?id=${docRef.id}`;
        } catch (err) {
            console.error("Save near miss failed:", err);
            showError("Save failed: " + err.message);
            resetSubmitBtn();
        }
    });

    function resetSubmitBtn() {
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = false;
        submitBtn.value = "Save Report";
    }

    function showError(msg) {
        errContainer.innerText = msg;
        errContainer.style.display = 'block';
    }
</script>
</body>
</html>
