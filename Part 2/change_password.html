<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - NTPC Online Safety Portal</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/forms.css">
    <link rel="stylesheet" href="/assets/css/tables.css">
</head>
<body>
<table class="page-shell" cellpadding="0" cellspacing="0">
    <tr id="header-container"></tr>
    <tr>
        <td class="sidebar-cell" id="sidebar-container" style="display:none;"></td>
        <td class="content-cell">
            <h2>Change Password</h2>
            
            <div id="status-message" style="display:none; padding:10px; margin-bottom:15px; border-radius:4px; font-size:13px;"></div>
            
            <form id="password-form" class="validate-form">
                <table class="form-table" style="max-width:550px; margin-top:20px;" cellpadding="6" cellspacing="0">
                    <tr>
                        <td class="label-cell" width="40%">New Password <span class="required">*</span></td>
                        <td><input type="password" id="new-password" class="text-input" required minlength="6"></td>
                    </tr>
                    <tr>
                        <td class="label-cell">Confirm Password <span class="required">*</span></td>
                        <td><input type="password" id="confirm-password" class="text-input" required minlength="6"></td>
                    </tr>
                    <tr>
                        <td>&nbsp;</td>
                        <td>
                            <input type="submit" value="Save Password" class="save-button">
                            <a href="/profile.html" class="plain-link-button" style="background:#6c757d; margin-left:10px;">Cancel</a>
                        </td>
                    </tr>
                </table>
            </form>
        </td>
    </tr>
    <tr id="footer-container"></tr>
</table>

<script type="module">
    import { initAuthCheck, changeUserPassword } from '/firebase/auth.js';
    import { enforcePageAccess } from '/firebase/roles.js';
    import { renderHeader, renderSidebar, renderFooter } from '/components/layout.js';

    initAuthCheck().then(async (user) => {
        if (!user) return;
        enforcePageAccess(user);
        
        await renderHeader(user);
        renderSidebar(user);
        renderFooter();
    }).catch(err => {
        console.error("Change password page init error:", err);
    });

    const form = document.getElementById('password-form');
    const msgDiv = document.getElementById('status-message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgDiv.style.display = 'none';
        
        const newPass = document.getElementById('new-password').value;
        const confPass = document.getElementById('confirm-password').value;
        
        if (newPass !== confPass) {
            showError("Passwords do not match.");
            return;
        }
        
        try {
            await changeUserPassword(newPass);
            showSuccess("Password changed successfully.");
            form.reset();
        } catch (err) {
            showError("Password change failed: " + err.message);
        }
    });

    function showError(msg) {
        msgDiv.innerText = msg;
        msgDiv.style.backgroundColor = '#f8d7da';
        msgDiv.style.color = '#721c24';
        msgDiv.style.border = '1px solid #f5c6cb';
        msgDiv.style.display = 'block';
    }

    function showSuccess(msg) {
        msgDiv.innerText = msg;
        msgDiv.style.backgroundColor = '#d4edda';
        msgDiv.style.color = '#155724';
        msgDiv.style.border = '1px solid #c3e6cb';
        msgDiv.style.display = 'block';
    }
</script>
</body>
</html>
